[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.pdo_pgsql",
  "php84Extensions.pdo_sqlite",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.dom",
  "php84Extensions.bcmath",
  "php84Extensions.gd",
  "php84Extensions.zip",
  "php84Extensions.fileinfo",
  "php84Extensions.tokenizer",
  "php84Extensions.ctype",
  "php84Extensions.curl",
  "php84Extensions.openssl",
  "php84Extensions.intl",
  "composer"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan migrate --force --seed && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
