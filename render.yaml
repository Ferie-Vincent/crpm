services:
  - type: web
    name: crpm
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: CRPM
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://crpm.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: crpm-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: crpm-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: crpm-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: crpm-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: crpm-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: LOG_LEVEL
        value: error

databases:
  - name: crpm-db
    plan: free
    databaseName: crpm
